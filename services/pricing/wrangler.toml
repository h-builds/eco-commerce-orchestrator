name = "eco-pricing-agent"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

# JS entry point — generated by workers-assets-gen
main = "build/worker.mjs"

[build]
# Generate required JS bindings and compile Go source to Wasm
command = "go run github.com/syumai/workers/cmd/workers-assets-gen@v0.32.0 -mode=go && GOOS=js GOARCH=wasm go build -o ./build/app.wasm ."

# Tell esbuild to embed .wasm files natively as a WebAssembly.Module.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = false
