name = "eco-pricing-agent"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

# JS entry point — bootstraps the Go Wasm runtime via wasm_exec.js
main = "index.js"

[build]
# Build the Go source to Wasm, then copy the required runtime shim from the
# local Go installation. wasm_exec.js provides the global `Go` class that
# index.js depends on. Without it the Worker cannot instantiate the binary.
command = "GOOS=js GOARCH=wasm go build -o main.wasm . && cp \"$(find $(go env GOROOT) -name wasm_exec.js | head -1)\" ."

# Tell esbuild to embed .wasm files natively as a WebAssembly.Module.
# "CompiledWasm" avoids the runtime `WebAssembly.instantiate` block on Cloudflare.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = false
